<!DOCTYPE html>
<html>
<head>
    <title>Forest Management System - Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="box">
    <h2>🌲 Indian Forest and Wildlife Management </h2>
    <h3>User Login</h3>

<input type="email" id="loginEmail" placeholder="Enter Registered Gmail" required>
<input type="password" id="loginPassword" placeholder="Enter Password">
<button onclick="passwordLogin()">Login with Password</button>

<hr>

<button onclick="sendOTP()">Generate OTP</button>
<input type="text" id="loginOTP" placeholder="Enter OTP">
<button onclick="verifyOTP()">Login with OTP</button>


    <p id="msg"></p>
    <a href="/signup">New User? Sign Up</a>
</div>

<script src="./js/script.js"></script>
</body>
</html>
