<!DOCTYPE html>
<html>
<head>
    <title>Forest Management System - Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="box">
    <h2>🌲 Indian Forest and Wildlife Management </h2>
    <h3>User Login</h3>

<input type="email" id="loginEmail" placeholder="Enter Registered Gmail" required>
<input type="password" id="loginPassword" placeholder="Enter Password" required>
<button onclick="startLogin()">Login</button>

<input type="text" id="loginOTP" placeholder="Enter OTP" style="display:none;">
<button id="otpBtn" onclick="verifyOTP()" style="display:none;">Verify OTP</button>

<p id="msg"></p>

    <a href="/signup">New User? Sign Up</a>
</div>

<script src="/js/script.js"></script>
</body>
</html>
